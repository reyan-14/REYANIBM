<!DOCTYPE html>
<html>
<head>
    <title>My Login Page</title>
</head>
<body>
    <h2>Login Page</h2>
    <form action="./form.html">
        <label for="fname">First Name</label><br>
        <input type="text" id="fname" name="fname" required><br>

    <a href="./index.html"></a>
</body>
</html>
